name: Deploy to VPS
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 206.189.144.88
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/picklrlab
            git pull origin main
            npm install
            npm run build
            pm2 restart picklrlab
